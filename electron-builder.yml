appId: com.karantrehan.snapit
productName: snapit
copyright: © Karan Trehan

directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
asar: true
# Keep English only; compress installers harder (helps the win/linux targets).
compression: maximum
electronLanguages:
  - en
# Ad-hoc sign the mac app so Apple Silicon will launch it (see build/afterPack.cjs).
afterPack: build/afterPack.cjs

# Register snapit as an editor for still images so it appears under Finder's
# right-click "Open With" (and the Windows/Linux equivalents). role: Editor keeps
# it a choice, not the default handler — it never hijacks Preview/Photos.
fileAssociations:
  - ext:
      - png
      - jpg
      - jpeg
      - webp
    name: Image
    description: Image
    role: Editor

mac:
  category: public.app-category.developer-tools
  icon: build/snapit.icns
  target:
    - dmg
  identity: null # unsigned — Gatekeeper warns on first open (see README)
dmg:
  title: snapit ${version}
  format: ULFO
  artifactName: ${productName}-${version}-mac-${arch}.${ext}

win:
  icon: build/icon.png
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-win-${arch}-setup.${ext}

linux:
  icon: build/icon.png
  category: Development
  target:
    - AppImage
  # Hard-coded x64 (CI builds on x64): ${arch} resolves to "x86_64" for AppImage,
  # which would break the consistent -mac-/-win-/-linux- naming.
  artifactName: ${productName}-${version}-linux-x64.${ext}
