<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>snapit</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: transparent;
      }
      @keyframes snapitPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.6);
        }
        100% {
          box-shadow: 0 0 0 8px rgba(255, 59, 48, 0);
        }
      }
      @keyframes snapitSpin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes snapitPop {
        from {
          transform: scale(0.6);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
